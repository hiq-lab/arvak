[workspace]
resolver = "2"
members = [
    "crates/*",
    "adapters/*",
    "demos",
]

[workspace.package]
version = "2.1.3"
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
repository = "https://github.com/hiq-lab/arvak"
keywords = ["quantum", "compiler", "qasm", "hal", "openqasm"]
categories = ["science", "compilers", "simulation"]

[workspace.dependencies]
# HAL Contract spec crate (canonical type source — do NOT modify).
# CI checks out hiq-lab/hal-contract into .hal-contract/ via actions/checkout.
# Locally, create a symlink:  ln -s ../hal-contract .hal-contract
hal-contract = { path = ".hal-contract/rust" }

# Internal crates
arvak-ir = { path = "crates/arvak-ir" }
arvak-qasm3 = { path = "crates/arvak-qasm3" }
arvak-compile = { path = "crates/arvak-compile" }
arvak-hal = { path = "crates/arvak-hal" }
arvak-sched = { path = "crates/arvak-sched" }
arvak-types = { path = "crates/arvak-types" }
arvak-auto = { path = "crates/arvak-auto" }
arvak-dashboard = { path = "crates/arvak-dashboard" }
arvak-bench = { path = "crates/arvak-bench" }
arvak-eval = { path = "crates/arvak-eval" }
arvak-sim = { path = "crates/arvak-sim" }

# Adapter crates
arvak-adapter-sim = { path = "adapters/arvak-adapter-sim" }
arvak-adapter-ddsim = { path = "adapters/arvak-adapter-ddsim" }
arvak-adapter-braket = { path = "adapters/arvak-adapter-braket" }
arvak-adapter-cudaq = { path = "adapters/arvak-adapter-cudaq" }
arvak-adapter-ionq = { path = "adapters/arvak-adapter-ionq" }
arvak-adapter-quandela = { path = "adapters/arvak-adapter-quandela" }

# Async runtime — minimal workspace features; crates add extras as needed.
tokio = { version = "1.43", features = ["macros", "rt-multi-thread", "sync", "time"] }
async-trait = "0.1"
futures = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml_ng = "0.10"

# Graph algorithms
petgraph = "0.7"

# Numeric
num-complex = { version = "0.4", features = ["serde"] }
ndarray = "0.16"

# Parsing
logos = "0.14"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# CLI
clap = { version = "4.5", features = ["derive", "env"] }
indicatif = "0.18"
console = "0.15"

# HTTP
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# AWS SDK
# Disable the "rustls" default feature on the SDK clients to avoid pulling
# the legacy rustls 0.21 / rustls-webpki 0.101.7 chain in
# aws-smithy-http-client (via aws-smithy-runtime/tls-rustls →
# legacy-rustls-ring). The modern HTTPS path uses rustls 0.23 via
# "default-https-client" (rustls-aws-lc). aws-config itself already sets
# default-features = false on its transitive aws-sdk-* deps, so this only
# needs to cover our DIRECT aws-sdk-* deps. See
# RUSTSEC-2026-0098/-0099/-0104.
aws-config = { version = "1", features = ["behavior-version-latest"] }
aws-sdk-braket = { version = "1", default-features = false, features = ["default-https-client", "rt-tokio"] }
aws-sdk-s3 = { version = "1", default-features = false, features = ["default-https-client", "rt-tokio", "sigv4a", "http-1x"] }

# Hashing
rustc-hash = "2.1"

# UUID generation
uuid = { version = "1.11", features = ["v4"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Directories
dirs = "5.0"

# Dynamic loading
libloading = "0.8"

# Allocator
mimalloc = { version = "0.1", default-features = false }

# Random (>= 0.8.6 closes RUSTSEC-2026-0097 unsoundness; cf. audit.toml)
rand = "0.8.6"

# Testing
proptest = "1.5"
criterion = "0.5"

# --- Dev profile: optimized for fast iteration ---
[profile.dev]
opt-level = 0
debug = "line-tables-only"    # ~30% faster incremental builds vs full debug
incremental = true

# Optimize dependencies even in dev mode (faster runtime during testing)
[profile.dev.package."*"]
opt-level = 2

# --- Release profile: optimized for maximum runtime performance ---
[profile.release]
lto = "thin"
codegen-units = 1
panic = "abort"               # smaller binaries, no unwind overhead
strip = "symbols"             # smaller binaries for distribution

# --- Release with fat LTO (slower build, faster binary) ---
[profile.release-lto]
inherits = "release"
lto = "fat"                   # ~5-10% faster than thin, longer link

# --- Bench profile ---
[profile.bench]
lto = "thin"
debug = 2                     # full debug info for profiling
