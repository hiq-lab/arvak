name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
          manylinux: auto
          working-directory: crates/arvak-python
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: crates/arvak-python/dist

  # Disabled: musllinux and aarch64 builds failing - can be re-enabled after PyO3 upgrade
  # musllinux:
  #   runs-on: ubuntu-latest
  #   strategy:
  #     matrix:
  #       target:
  #         - x86_64-unknown-linux-musl
  #         - aarch64-unknown-linux-musl
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: '3.13'
  #     - name: Build wheels
  #       uses: PyO3/maturin-action@v1
  #       with:
  #         target: ${{ matrix.target }}
  #         args: --release --out dist --find-interpreter
  #         sccache: 'true'
  #         manylinux: musllinux_1_2
  #         working-directory: crates/arvak-python
  #       env:
  #         PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'
  #     - name: Upload wheels
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: wheels-musllinux-${{ matrix.target }}
  #         path: crates/arvak-python/dist

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: ${{ matrix.target }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
          working-directory: crates/arvak-python
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: crates/arvak-python/dist

  macos:
    runs-on: macos-14
    strategy:
      matrix:
        target: [aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
          working-directory: crates/arvak-python
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: crates/arvak-python/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: crates/arvak-python

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: crates/arvak-python/dist

  qdmi-linux:
    name: QDMI Device Library (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build QDMI device library
        run: cargo build -p arvak-qdmi-device --release

      - name: Rename artifact
        run: cp target/release/libarvak_qdmi_device.so libqdmi_arvak.so

      - name: Upload QDMI library
        uses: actions/upload-artifact@v4
        with:
          name: qdmi-linux-x86_64
          path: libqdmi_arvak.so

  qdmi-macos:
    name: QDMI Device Library (macOS ARM)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        run: brew install protobuf

      - name: Build QDMI device library
        run: cargo build -p arvak-qdmi-device --release

      - name: Rename artifact
        run: cp target/release/libarvak_qdmi_device.dylib libqdmi_arvak.dylib

      - name: Upload QDMI library
        uses: actions/upload-artifact@v4
        with:
          name: qdmi-macos-aarch64
          path: libqdmi_arvak.dylib

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, windows, macos, sdist, qdmi-linux, qdmi-macos]
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release with QDMI libraries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            qdmi-linux-x86_64/libqdmi_arvak.so
            qdmi-macos-aarch64/libqdmi_arvak.dylib
          generate_release_notes: true
